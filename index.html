<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홍주초등학교 전자기기 대여장부</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* 터치 및 마우스로 넘기기 편한 커스텀 가로 스크롤바 */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        body { background-color: #F0F4F8; min-height: 100vh; }
        input[type="date"]::-webkit-calendar-picker-indicator { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // 아이콘 컴포넌트
        const CalendarIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const ChevronLeftIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;
        const ChevronRightIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const TabletIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>;
        const LaptopIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 16V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v9m16 0H4m16 0 1.28 2.55a1 1 0 0 1-.9 1.45H3.62a1 1 0 0 1-.9-1.45L4 16"></path></svg>;
        const InfoIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const ClockIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;

        const getDateString = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const formatDisplayDate = (date) => {
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            return `${date.getFullYear()}년 ${date.getMonth() + 1}월 ${date.getDate()}일 (${days[date.getDay()]})`;
        };

        const App = () => {
            const [currentTime, setCurrentTime] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(new Date());
            const [isLoading, setIsLoading] = useState(false);
            
            const [selectedDevice, setSelectedDevice] = useState('태블릿');
            const [selectedGrade, setSelectedGrade] = useState(1);
            const [selectedClass, setSelectedClass] = useState(1);

            const classesPerGrade = { 1: 5, 2: 2, 3: 2, 4: 2, 5: 1, 6: 1 };

            useEffect(() => {
                setSelectedClass(1);
            }, [selectedGrade]);

            // TODO: Apps Script를 새 배포 후 받은 URL로 변경해 주세요!
            const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzfXETaAlbFQCforhMrt4FKohpMAQtkTC9K0bw3fWg97Z0RtBQFJ1NA4KY4CRmM1FdGLA/exec';

            const baseSchedule = [
                { period: 1, name: '1교시', time: '09:00~09:40', status: 'available', usedBy: null },
                { period: 2, name: '2교시', time: '09:50~10:30', status: 'available', usedBy: null },
                { period: 3, name: '3교시', time: '10:40~11:20', status: 'available', usedBy: null },
                { period: 4, name: '4교시', time: '11:30~12:10', status: 'available', usedBy: null },
                { period: 5, name: '5교시', time: '13:00~13:40', status: 'available', usedBy: null },
                { period: 6, name: '6교시', time: '13:50~14:30', status: 'available', usedBy: null },
                { period: 7, name: '방과후', time: '14:40~16:00', status: 'available', usedBy: null },
            ];

            const createBaseDayData = () => {
                const groups = ['1-2학년', '3-4학년', '5-6학년'];
                const devices = ['태블릿', '웨일북'];
                let data = {};
                groups.forEach(g => {
                    data[g] = {};
                    devices.forEach(d => {
                        data[g][d] = baseSchedule.map(s => ({ ...s }));
                    });
                });
                return data;
            };

            const [schedulesByDate, setSchedulesByDate] = useState({});

            const fetchSheetData = useCallback(async () => {
                if (!GOOGLE_SHEET_URL || GOOGLE_SHEET_URL.trim() === '') return;
                const dateStr = formatDisplayDate(selectedDate);
                setIsLoading(true);

                try {
                    const timestamp = new Date().getTime();
                    const urlWithParams = `${GOOGLE_SHEET_URL}?date=${encodeURIComponent(dateStr)}&t=${timestamp}`;

                    const response = await fetch(urlWithParams, {
                        method: 'GET',
                        redirect: 'follow',
                        cache: 'no-store'
                    });
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    // 디버깅을 위해 응답을 텍스트로 먼저 받아 확인
                    const textData = await response.text();
                    const statusMap = JSON.parse(textData);
                    
                    console.log(`[${dateStr}] 시트 데이터 연동 성공!`, statusMap);
                    
                    setSchedulesByDate(prev => {
                        let newDayData = createBaseDayData();
                        ['1-2학년', '3-4학년', '5-6학년'].forEach(g => {
                            ['태블릿', '웨일북'].forEach(d => {
                                newDayData[g][d] = newDayData[g][d].map(s => {
                                    const key = `${g}_${d}_${s.period}`;
                                    return statusMap[key] ? { ...s, ...statusMap[key] } : { ...s };
                                });
                            });
                        });
                        return { ...prev, [getDateString(selectedDate)]: newDayData };
                    });
                } catch (e) {
                    console.warn("데이터 동기화 실패 (시트에서 데이터를 읽지 못했습니다):", e);
                    setSchedulesByDate(prev => ({
                        ...prev,
                        [getDateString(selectedDate)]: prev[getDateString(selectedDate)] || createBaseDayData()
                    }));
                } finally {
                    setIsLoading(false);
                }
            }, [selectedDate, GOOGLE_SHEET_URL]);

            useEffect(() => { fetchSheetData(); }, [fetchSheetData]);
            
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const dateKey = getDateString(selectedDate);
            const currentGroup = selectedGrade <= 2 ? '1-2학년' : (selectedGrade <= 4 ? '3-4학년' : '5-6학년');
            
            const daySchedules = schedulesByDate[dateKey] || createBaseDayData();
            const currentSchedule = daySchedules[currentGroup][selectedDevice];
            
            const getActivePeriod = () => {
                const now = currentTime.getHours() * 60 + currentTime.getMinutes();
                return baseSchedule.find(s => {
                    const [start, end] = s.time.split('~').map(t => {
                        const [h, m] = t.split(':').map(Number);
                        return h * 60 + m;
                    });
                    return now >= start && now <= end;
                });
            };
            const activePeriodPeriod = getActivePeriod()?.period;

            const handleAction = async (periodNum, action) => {
                const recordData = {
                    date: formatDisplayDate(selectedDate),
                    time: currentTime.toLocaleTimeString('ko-KR'),
                    group: currentGroup, device: selectedDevice, grade: selectedGrade, classNum: selectedClass,
                    period: periodNum, action: action === 'borrow' ? '대여' : action === 'return' ? '반납' : '취소'
                };

                setSchedulesByDate(prev => {
                    const safeDayData = prev[dateKey] || createBaseDayData();
                    const updated = safeDayData[currentGroup][selectedDevice].map(item => {
                        if (item.period === periodNum) {
                            if (action === 'cancel' || action === 'return') return { ...item, status: 'available', usedBy: null };
                            return { ...item, status: 'in-use', usedBy: { grade: selectedGrade, class: selectedClass } };
                        }
                        return item;
                    });
                    return { ...prev, [dateKey]: { ...safeDayData, [currentGroup]: { ...safeDayData[currentGroup], [selectedDevice]: updated } } };
                });

                if (GOOGLE_SHEET_URL) {
                    try {
                        await fetch(GOOGLE_SHEET_URL, { 
                            method: 'POST', 
                            mode: 'no-cors', 
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify(recordData) 
                        });
                        setTimeout(fetchSheetData, 1000);
                    } catch (error) {
                        console.error("저장 전송 에러:", error);
                    }
                }
            };

            // 선택 가능한 반 목록: 1반~N반, 그리고 마지막에 '방과후돌봄' 추가
            const classOptions = [
                ...Array.from({ length: classesPerGrade[selectedGrade] }, (_, i) => i + 1),
                '방과후돌봄'
            ];

            return (
                <div className="font-sans text-gray-800 pb-10">
                    
                    {/* 상단 헤더 영역 - 전체 너비 사용 (반응형 복구) */}
                    <header className="bg-[#0284C7] text-white p-4 pb-6 shadow-md z-10 relative transition-opacity duration-300" style={{ opacity: isLoading ? 0.8 : 1 }}>
                        <div className="max-w-6xl mx-auto flex justify-between items-end">
                            <div>
                                <div className="text-xs lg:text-sm text-sky-100 mb-1">홍주초등학교 {isLoading && '(동기화 중...)'}</div>
                                <h1 className="text-2xl lg:text-3xl font-bold tracking-tight">전자기기 대여장부</h1>
                            </div>
                            <div className="text-right flex items-baseline gap-3">
                                <div className="text-sm lg:text-base text-sky-100 font-medium hidden sm:block">{formatDisplayDate(selectedDate)}</div>
                                <div className="text-3xl lg:text-4xl font-bold">{currentTime.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' })}</div>
                            </div>
                        </div>
                    </header>

                    {/* 메인 레이아웃: PC에서는 양옆 분할, 모바일에서는 위아래 배치 */}
                    <main className="max-w-6xl mx-auto mt-6 px-4 flex flex-col lg:flex-row gap-6">
                        
                        {/* 왼쪽 (또는 상단) 제어부 */}
                        <div className="w-full lg:w-[380px] xl:w-[420px] shrink-0 space-y-5">
                            
                            {/* 기기 선택 탭 */}
                            <div className="bg-white p-1.5 rounded-2xl shadow-sm flex border border-gray-200">
                                <button onClick={() => setSelectedDevice('태블릿')} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-[15px] font-bold transition-all ${selectedDevice === '태블릿' ? 'bg-[#0284C7] text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>
                                    <TabletIcon size={20} /> 태블릿
                                </button>
                                <button onClick={() => setSelectedDevice('웨일북')} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl text-[15px] font-bold transition-all ${selectedDevice === '웨일북' ? 'bg-[#0284C7] text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>
                                    <LaptopIcon size={20} /> 웨일북
                                </button>
                            </div>

                            {/* 상태 표시 바 */}
                            <div className="bg-[#F0F9FF] border border-[#BAE6FD] text-[#0369A1] p-4 rounded-2xl flex items-start gap-3 shadow-sm">
                                <InfoIcon size={20} className="text-[#0EA5E9] shrink-0 mt-0.5" />
                                <div className="flex flex-col">
                                    <span className="font-bold text-[14px]">[{currentGroup}] 현재 상태 ({selectedDevice})</span>
                                    <span className="text-[13px] opacity-90 mt-1">
                                        {(() => {
                                            const currentPeriod = currentSchedule.find(s => s.period === activePeriodPeriod);
                                            if (currentPeriod?.status === 'in-use') {
                                                return currentPeriod.usedBy.class === '방과후돌봄' 
                                                    ? `${currentPeriod.usedBy.grade}학년 방과후돌봄 사용중` 
                                                    : `${currentPeriod.usedBy.grade}학년 ${currentPeriod.usedBy.class}반 사용중`;
                                            }
                                            return '대여 가능한 상태입니다.';
                                        })()}
                                    </span>
                                </div>
                            </div>

                            {/* 학년 및 반 선택 영역 */}
                            <div className="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm space-y-4">
                                <div>
                                    <div className="text-[12px] font-bold text-gray-400 mb-2">학년 선택</div>
                                    {/* 커스텀 스크롤바가 적용된 가로 스크롤 영역 */}
                                    <div className="flex items-center gap-2 overflow-x-auto custom-scrollbar pb-2 pt-1">
                                        {[1, 2, 3, 4, 5, 6].map(gradeNum => (
                                            <button 
                                                key={`grade-${gradeNum}`} 
                                                onClick={() => setSelectedGrade(gradeNum)} 
                                                className={`shrink-0 w-10 h-10 rounded-full font-bold text-[14px] transition-all shadow-sm 
                                                    ${selectedGrade === gradeNum ? 'bg-[#0EA5E9] text-white ring-2 ring-sky-200' : 'bg-gray-50 text-gray-600 border border-gray-200 hover:bg-gray-100'}
                                                `}
                                            >
                                                {gradeNum}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="pt-2 border-t border-gray-100">
                                    <div className="text-[12px] font-bold text-gray-400 mb-2">학급 선택</div>
                                    {/* 커스텀 스크롤바가 적용된 가로 스크롤 영역 */}
                                    <div className="flex items-center gap-2 overflow-x-auto custom-scrollbar pb-2 pt-1">
                                        {classOptions.map(classNum => (
                                            <button 
                                                key={`class-${classNum}`} 
                                                onClick={() => setSelectedClass(classNum)} 
                                                className={`shrink-0 px-4 py-2 rounded-xl border font-bold text-[13px] whitespace-nowrap transition-all shadow-sm
                                                    ${selectedClass === classNum ? 'bg-[#E0F2FE] border-[#7DD3FC] text-[#0284C7]' : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}
                                                `}
                                            >
                                                {typeof classNum === 'number' ? `${classNum}반` : classNum}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* 날짜 표시기 (모바일용 - PC에서는 아래 시간표 헤더에 있음) */}
                            <div className="lg:hidden bg-white rounded-xl border border-gray-200 p-3 flex justify-between items-center shadow-sm">
                                <button onClick={() => setSelectedDate(d => new Date(d.setDate(d.getDate()-1)))} className="p-2 text-gray-400 hover:bg-gray-100 hover:text-[#0EA5E9] rounded-lg transition-colors"><ChevronLeftIcon size={20} /></button>
                                <div className="relative flex items-center justify-center gap-2 font-bold text-[15px] text-gray-800 cursor-pointer flex-1 group">
                                    <CalendarIcon size={18} className="text-[#0EA5E9] group-hover:scale-110 transition-transform" />
                                    <span>{formatDisplayDate(selectedDate)}</span>
                                    <input type="date" className="absolute w-full h-full opacity-0 cursor-pointer" value={getDateString(selectedDate)} onChange={e => { if(e.target.value) setSelectedDate(new Date(e.target.value)); }} />
                                </div>
                                <button onClick={() => setSelectedDate(d => new Date(d.setDate(d.getDate()+1)))} className="p-2 text-gray-400 hover:bg-gray-100 hover:text-[#0EA5E9] rounded-lg transition-colors"><ChevronRightIcon size={20} /></button>
                            </div>
                            {getDateString(selectedDate) !== getDateString(new Date()) && (
                                <div className="lg:hidden flex justify-center -mt-2">
                                    <button onClick={() => setSelectedDate(new Date())} className="bg-sky-100 text-sky-700 text-xs font-bold px-4 py-1.5 rounded-full shadow-sm">오늘로 돌아가기</button>
                                </div>
                            )}

                        </div>

                        {/* 오른쪽 (또는 하단) 시간표 리스트 영역 */}
                        <div className="flex-1 bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden flex flex-col h-fit">
                            
                            {/* 시간표 헤더 (PC 전용 날짜 선택기) */}
                            <div className="hidden lg:flex justify-between items-center bg-gray-50 px-6 py-4 border-b border-gray-200">
                                <div className="font-bold text-gray-700 flex items-center gap-2">
                                    <ClockIcon size={18} className="text-gray-400" />
                                    일일 대여 현황
                                </div>
                                
                                <div className="flex items-center gap-1">
                                    <button onClick={() => setSelectedDate(d => new Date(d.setDate(d.getDate()-1)))} className="p-1.5 text-gray-400 hover:bg-white hover:shadow-sm rounded-lg transition-all"><ChevronLeftIcon size={18} /></button>
                                    
                                    <div className="relative flex items-center gap-2 font-bold text-[14px] text-gray-700 bg-white px-4 py-2 rounded-xl border border-gray-200 shadow-sm cursor-pointer hover:border-[#0EA5E9] transition-colors">
                                        <CalendarIcon size={16} className="text-[#0EA5E9]" />
                                        <span>{formatDisplayDate(selectedDate)}</span>
                                        <input type="date" className="absolute w-full h-full left-0 top-0 opacity-0 cursor-pointer" value={getDateString(selectedDate)} onChange={e => { if(e.target.value) setSelectedDate(new Date(e.target.value)); }} />
                                    </div>
                                    
                                    <button onClick={() => setSelectedDate(d => new Date(d.setDate(d.getDate()+1)))} className="p-1.5 text-gray-400 hover:bg-white hover:shadow-sm rounded-lg transition-all"><ChevronRightIcon size={18} /></button>
                                    
                                    {getDateString(selectedDate) !== getDateString(new Date()) && (
                                        <button onClick={() => setSelectedDate(new Date())} className="ml-2 bg-sky-100 text-sky-700 hover:bg-sky-200 text-[12px] font-bold px-3 py-1.5 rounded-lg transition-colors">
                                            오늘
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* 리스트 아이템들 */}
                            <div className="divide-y divide-gray-100">
                                {currentSchedule.map((item) => {
                                    const isNow = getDateString(selectedDate) === getDateString(new Date()) && item.period === activePeriodPeriod;
                                    return (
                                        <div key={item.period} className={`flex items-center p-4 lg:p-5 relative transition-colors ${isNow ? 'bg-[#F8FAFC]' : 'bg-white hover:bg-gray-50'}`}>
                                            
                                            {isNow && <div className="absolute left-0 top-0 bottom-0 w-[5px] bg-[#0EA5E9]"></div>}

                                            <div className="w-[80px] lg:w-[100px] flex flex-col items-center justify-center shrink-0">
                                                <span className={`font-extrabold text-[15px] lg:text-[16px] ${isNow ? 'text-[#0284C7]' : 'text-gray-700'}`}>{item.name}</span>
                                                <span className="text-[10px] lg:text-[11px] text-gray-400 mt-1 font-medium">{item.time}</span>
                                            </div>

                                            <div className="flex-1 flex justify-between items-center pl-4 lg:pl-6 border-l border-gray-100 ml-2">
                                                {item.status === 'in-use' ? (
                                                    <>
                                                        <div className="bg-[#F0FDF4] text-[#166534] border border-[#BBF7D0] px-3 py-1.5 rounded-lg text-[13px] lg:text-[14px] font-bold shadow-sm whitespace-nowrap overflow-hidden text-ellipsis max-w-[140px] sm:max-w-none">
                                                            {item.usedBy.class === '방과후돌봄' ? `${item.usedBy.grade}학년 방과후돌봄` : `${item.usedBy.grade}학년 ${item.usedBy.class}반`}
                                                        </div>
                                                        <div className="flex gap-2 shrink-0">
                                                            <button onClick={() => handleAction(item.period, 'cancel')} className="px-3 lg:px-4 py-2 rounded-lg border border-red-200 bg-[#FEF2F2] text-red-600 text-[13px] lg:text-[14px] font-bold hover:bg-red-50 transition-colors">취소</button>
                                                            <button onClick={() => handleAction(item.period, 'return')} className="px-3 lg:px-4 py-2 rounded-lg border border-sky-200 bg-[#F0F9FF] text-[#0369A1] text-[13px] lg:text-[14px] font-bold hover:bg-sky-50 transition-colors">반납</button>
                                                        </div>
                                                    </>
                                                ) : (
                                                    <>
                                                        <div className="text-gray-400 text-[14px] lg:text-[15px] font-medium">대여 가능</div>
                                                        <button onClick={() => handleAction(item.period, 'borrow')} className="px-5 lg:px-6 py-2 rounded-lg bg-gray-100 border border-gray-200 text-gray-600 hover:bg-[#E0F2FE] hover:text-[#0284C7] hover:border-[#BAE6FD] text-[13px] lg:text-[14px] font-bold transition-all shadow-sm shrink-0">
                                                            대여하기
                                                        </button>
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </main>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
